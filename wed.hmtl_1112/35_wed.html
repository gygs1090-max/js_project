<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>요소 위치 지정하기</title>
    <style>
        .static {
            position: static;
        }
        #relative-1 {
            position: relative;
        }
        #relative-2 {
            position: relative;
            left: 100px;
            top: -50px;
        }
        #fixed {
            width:  100px;
            height: 100px;
            background-color: #00aeff;
            position: fixed;
            right: 30px;
            top: 30px;
        }
        p {
            width: 500px;
            padding: 10px;
            border: 10px solid #2600ff;
        }
    </style>
    </head>
    <body>
        <p id="static">북중미 월드컵 A조 예선3차전 남아브리카공화국 VS 대한민국 </p>
        <p id="static">예상 스코어 ( 2:1 )</p>
        <p id="static">한국 2등 본선 진출 예상함</p>
        <p id="fixed">대한민국 16강 탈락함</p>
    </body>
    </html>
