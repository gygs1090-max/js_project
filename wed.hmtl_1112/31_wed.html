<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>김원일 홈페이지</title>

    <style>
        body {
            margin: 0;
            height: 100vh;

            /* 배경 이미지 */
            background: url('12_healing.jpg') center center no-repeat fixed;
            background-size: cover;

            /* 글자 가운데 정렬 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grad {
            padding: 40px 80px;

            /* 그라데이션 */
            background: linear-gradient(
                to right bottom,
                rgba(0, 0, 255, 0.6),
                rgba(255, 255, 255, 0.6)
            );

            border-radius: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: white;
            font-size: 80px;
            text-shadow: 2px 2px 5px black;
        }

        p {
            color: white;
            font-size: 24px;
            text-shadow: 1px 1px 3px black;
        }
    </style>
</head>

<body>

    <div class="grad">
        <h1>김원일</h1>
        <p>HTML & CSS 공부중 🚀</p>
    </div>

</body>
</html>
