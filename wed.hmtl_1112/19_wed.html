<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문하기 폼 만들기</title>
</head>

<input type="hidden" name="url" value="사이트를 통한 직접 로그인">
<label>아이디: <input type="text" id="user_id" size="10"></label>
<label>비밀번호: <input type="password" id="user_pw" size="10"></label>
<input type="submit" value="로그인">

<form>
    <fieldset>
        <legend>배송정보</legend>
        <ul id="shipping">
        </ul>
            <li>
                <label for="prod">주문 상품</label>
                <input type="text" id="prod" value="상품용 3kg">
            </li>
            <li>
                <label for="user_name">이름</label>
                <input type="text" id="user_name" autofocus>
            </li>
            <li>
                <label for="addr">배송 주소</label>
                <input type="text" id="addr" required>
            </li>
            <li>
                <label for="mail">이메일</label>
                <input type="tel" id="phone" placeholder="하이픈 빼고 입력해 주세요.(01090523032)" required>
            </li>
            <li>
                <label for="d-day">배송 지정</label>
                <input type="date" id="d-day"> <small>(주문일로부터 최소 3일 이후)</small>
            </li>
        </ul>
    </fieldset>
    <div>
        <input type="submit" value="주문하기">
        <input type="reset" value="취소하기">
    </div>
</form>
