<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>위치 속성</title>
    <style>
        p {
            width: 500px;
            height: 200px;
            background-color: #ffffff;
            border: 10px solid #00eeff;
            line-height: 2;
        }
        #staic {
            position: static;
        }
        #relation-1 {
            position: relative;
        }
        #relation-2 {
            position: relative;
            left: 100px;
            top: -50px;
        }
        #fixed {
            width: 100px;
            height: 100px;
            background-color: #222;
            position: fixed;
            right: 30px;
            top: 30px;
        }
    </style>
</head>
<body>
    <p id="pos1">2026. 06. 19 멕시코 vs 한국 북중미 월드컵 축구예선 2차전.</p>
    <p id="pos2">멕시코(1) : 한국(0).</p>
    <p id="pos3">한국 포메이션이 3백을 써서 짐.</p>
</body>
</html>
