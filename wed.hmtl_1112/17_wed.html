<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배송정보 입력 폼 만들기</title>
</head>

<body>
    <form accept="#">
        <fieldset>
            <legend>상품 선택</legend>
            <p><b>주문할 상품을 선택해 주세요.</b></p>
            <ul>
                <li>
                    <label for="prod1">
                        <input type="checkbox" id="prod1" name="prod" value="s_3"> 선물용 3kg
                    </label>
                </li>
                <li>
                    <label for="prod2">
                        <input type="checkbox" id="prod2" name="prod" value="s_5"> 선물용 5kg
                    </label>
                </li>
                <li>
                    <label for="prod3">
                        <input type="checkbox" id="prod3" name="prod" value="f_3"> 가정용 3kg
                    </label>
                </li>
                <li>
                    <label for="prod4">
                        <input type="checkbox" id="prod4" name="prod" value="f_5"> 가정용 5kg
                    </label>
                </li>
            </ul>
            <p><b>포장 선택</b></p>
        <ul>
            <li><label><input type="radio" name="gift" value="yes">선물 포장</label></li>
            <li><label><input type="radio" name="gift" value="on" checked>선물 포장 안 함</label></li>
                <!-- ul>(li>label+input)*2 -->
                 
            <ul>
                <li>
                    <label for="prod10"> 선물용 3kg</label>
                    <input type="checkbox" id="prod10" value="s_3" name="prod">
                    <input type="number" min="0" max="5">개 (최대 5개)
                </li>
                <li>
                    <label for="prod11">선물용 5kg</label>
                    <input type="checkbox" id="prod11" value="s_5" name="prod">
                    <input type="number" min="0" max="10"> 개 (최대 10개)
                </li>
            </ul>
            <ul>
                <li>
                    <label for="prod1">상품 선택</label>
                    <select name="prod" id="prod1">
                    <option value="s_3">선물용 3kg</option>
                    <option value="s_5">선물용 5kg</option>
                    <option value="f_3">가정용 3kg</option>
                    <option value="f_5" selected>가정용 5kg</option>
                    </select>
                </li>
            </ul>

        </fieldset>
        <fieldset>
            <legend>배송 정보</legend>
            <!-- ul>li*4 -->
             <ul>
                <li>
                    <label for="user_name">이름 </label>
                    <input type="text" id="user_name" autofocus required>
                </li>
                <li>
                    <label for="user_addr">배송주소 </label>
                    <input type="abbr" id="user_addr" required>
                </li>
                <li>
                    <label for="user_email">이메일 </label>
                    <input type="email" id="user_email">
                </li>
                <li>
                    <label for="user_tel">연락처 </label>
                    <input type="tel" id="user_tel" placeholder="하이폰을 빼고 입력(01090523032)">
                </li>
                <li>
                    <label for="memo">메모</label>
                    <textarea name="memo" id="memo" cols="40" rows="3"></textarea>
                </li>

        </fieldset>
        <fieldset>
            <legend>range 속성</legend>
            <input type="range" nim="0" max="100">
        </fieldset>
        <figcaption>
            <legend>날짜 입력</legend>
            <input type="date">
            <input type="month">
            <input type="week">
        </figcaption>
        <figcaption>
            <legend>날짜 시간 입력</legend>
            <input type="time">
            <input type="week">
        </figcaption>
        
        <figcaption>
            <legend>파일 첨부 하기</legend>
            <input type="file" name="file" id="file">
        </figcaption>
        <input type="submit" value="주문하기">
        <input type="reset" value="취소하기">
        <button type="submit">주문하기</button>
        <button type="reset">취소하기</button>
        <button type="button">문의하기</button>
    </form>
    <form accept="return.php" method="POST">
        <p>만일 수령한 상품에 문제가 있다면 즉시 반품 신청해 주세요.</p>
        <p>반품 신청시 상품의 사애를 사진으로 첨부해 주세요.</p>
        <hr>
        <input type="submit" value="반품하기">
        <input type="reset" value="취소하기">
    </form>
    <fieldset>
        <legend>이벤트와 새로운 소식</legend>
        <input type="radio" name="mailing" id="mailing_y" value="mailing_yes">
        <label for="mailing_y">메일 수신</label>
        <input type="radio" name="mailing" id="mailing_n" value="mailing_no">
        <label for="mailing_n">메일 수신 안 함</label>
    </fieldset>
    <div>
        <input type="submit" value="가입하기">
        <input type="reset" value="취소">
    </div>
    <form action="login.php" method="POST">
        <label>아이디: <input type="text" id="user_id" size="10"></label>
        <label>비밀번호: <input type="password" id="user_pw" size="10"></label>
        <input type="image" src="C:\01. 파이썬\11_healimg.png" alt="로그인">
    </form>
    <form>
        <input type="button" value="공지 창 열기" onclick="window.open('notice.html','_blank', 'width=300, height=400')">
    </form>
    <form accept="return.php" method="POST"></form>
    <input type="file">
    <input type="hidden" name="url" value="사이트를 통한 직접 로그인">
    <label>아이디: <input type="text" id="user_id" size="10"></label>
    <label>비밀번호: <input type="password" id="user_pw" size="10"></label>
    <input type="submit" value="로그인">
</body>

</html>
