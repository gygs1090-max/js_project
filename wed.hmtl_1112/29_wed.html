<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>이지스퍼블리싱</title>

    <style>
        ul {
            list-style-type: none;
            margin-left: 30px;
        }

        li {
            background-image: url('002_healing.jpg'); /* 목록 아이콘 */
            background-repeat: no-repeat;
            background-position: left center;
            padding-left: 50px;
            line-height: 40px;
        }

        body {
            background-image: url('001_healing.png'); /* 페이지 배경 */
            background-repeat: no-repeat;
            background-position: right top;
            background-attachment: fixed;
        }

        div {
            background-image: url('005_healing.png'); /* 각 div 배경 */
            background-repeat: no-repeat;
            background-position: right top;
            background-attachment: fixed;

            width: 300px;
            height: 150px;
            border: 5px solid #000;
            padding: 20px;
            margin: 20px;
        }

        #bg1 {
            background-origin: padding-box;
        }

        #bg2 {
            background-origin: border-box;
        }

        #bg3 {
            background-origin: content-box;
        }

        div {
            background-position: 0 0;
        }
    </style>
</head>

<body>
    
    <h2>이지스퍼블리싱</h2>

    <ul>
        <li>회사 소개</li>
        <li>도서</li>
        <li>자료실</li>
        <li>동영상 강의</li>
    </ul>

    <div id="bg1">padding-box</div>
    <div id="bg2">border-box</div>
    <div id="bg3">content-box</div>

</body>

</html>
