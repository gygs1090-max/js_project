{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2>{% if request.endpoint == 'question.modify' %}질문 수정{% else %}질문 등록{% endif %}</h2>
</div>
<form method="post" class="my-3">
    {{ form.csrf_token }}
    {% include "form_errors.html" %}
    <div class="form-group">
        <label for="subject">제목</label>
        <input type="text" name="subject" id="subject" value="{{ form.subject.data or '' }}" class="form-control">
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea name="content" id="content" rows="10" class="form-control">{{ form.content.data or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">저장</button>
</form>
{% endblock %}
